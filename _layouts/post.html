---
layout: default
---

<article class="post">
  <h1>{{ page.title }}</h1>

  <div style="max-width: 1050px;" class="entry">
    {{ content }}
  </div>

  <div class="date">
    Written on {{ page.date | date: "%B %e, %Y" }}
  </div>

  {% include disqus.html disqus_identifier=page.disqus_identifier %}
</article>
